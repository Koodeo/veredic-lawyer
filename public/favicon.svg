<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A3B4E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1E21;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#F7F3F1"/>
  
  <!-- V Monogram -->
  <path d="M 25 20 L 50 70 L 75 20 L 65 20 L 50 55 L 35 20 Z" 
        fill="url(#vGrad)" 
        stroke="#C9B398" 
        stroke-width="0.5"/>
  
  <!-- Accent line -->
  <line x1="30" y1="80" x2="70" y2="80" 
        stroke="#C9B398" 
        stroke-width="2" 
        stroke-linecap="round"/>
</svg>
